<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Yatırım Takip</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">📈</div>
  <h1>Yatırım Takip</h1>
  <p class="auth-sub">Portföyünü takip et, getirine hakim ol.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn-primary btn-full">Giriş Yap</button>
  </form>
  <p class="auth-link">Hesabın yok mu? <a href="{{ url_for('register') }}">Kayıt Ol</a></p>
</div>
</body>
</html>
